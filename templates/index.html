<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quantum Cat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:   #ff6eb4;
      --purple: #b06eff;
      --teal:   #6ef0ff;
      --bg:     #0d0b14;
      --card:   #13101e;
      --border: #2a1f40;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'Outfit', system-ui, sans-serif;
      color: #ddd0ff;
      overflow: hidden;
    }

    /* floating paws background */
    .paws {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .paw {
      position: absolute;
      font-size: 1.6rem;
      opacity: 0.06;
      animation: drift linear infinite;
    }

    @keyframes drift {
      from { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.06; }
      90%  { opacity: 0.06; }
      to   { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 48px 44px;
      width: 560px;
      box-shadow:
        0 0 0 1px #1a1030,
        0 0 80px rgba(176, 110, 255, 0.12),
        0 0 160px rgba(255, 110, 180, 0.06);
    }

    /* cat face */
    .cat-face {
      text-align: center;
      margin-bottom: 18px;
      position: relative;
    }

    .cat-svg {
      width: 84px;
      height: 84px;
      filter: drop-shadow(0 0 18px rgba(176,110,255,0.6));
    }

    /* blinking eyes */
    .eye { animation: blink 4s ease-in-out infinite; }
    .eye-r { animation: blink 4s ease-in-out infinite 0.08s; }
    @keyframes blink {
      0%, 92%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.08); }
    }

    h1 {
      font-family: 'Space Mono', monospace;
      font-size: 1.35rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
      background: linear-gradient(90deg, var(--pink), var(--purple), var(--teal));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.04em;
    }

    .subtitle {
      font-size: 0.8rem;
      color: #5a4a7a;
      text-align: center;
      margin-bottom: 32px;
      letter-spacing: 0.02em;
    }

    .btn-row {
      display: flex;
      justify-content: center;
    }

    button {
      position: relative;
      background: linear-gradient(135deg, #7a2fff, #ff2f9a);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 13px 44px;
      font-family: 'Space Mono', monospace;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 0 24px rgba(180, 60, 255, 0.4);
    }

    button::before {
      content: '🐾 ';
    }

    button:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-2px);
      box-shadow: 0 0 36px rgba(255, 60, 180, 0.55);
    }
    button:active:not(:disabled) { transform: translateY(0); }
    button:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }

    /* log panel */
    .log-panel {
      margin-top: 28px;
      background: #0a0816;
      border: 1px solid #1e1530;
      border-radius: 12px;
      padding: 14px 16px;
      max-height: 240px;
      overflow-y: auto;
      display: none;
      scroll-behavior: smooth;
      font-family: 'Space Mono', monospace;
    }

    .log-panel::-webkit-scrollbar { width: 4px; }
    .log-panel::-webkit-scrollbar-track { background: transparent; }
    .log-panel::-webkit-scrollbar-thumb { background: #3a1f60; border-radius: 4px; }

    .log-panel.visible { display: block; }

    .log-entry {
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid #120e24;
      font-size: 0.75rem;
      line-height: 1.5;
      animation: fadeUp 0.2s ease;
    }

    .log-entry:last-child { border-bottom: none; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .log-time { color: #3a2f5a; padding-top: 1px; user-select: none; }
    .log-msg  { color: #7a6aaa; }
    .log-entry.success .log-msg { color: #80ffaa; }
    .log-entry.error   .log-msg { color: #ff6a6a; }

    /* typing dots */
    .typing {
      display: flex;
      gap: 5px;
      padding: 10px 0 4px;
      align-items: center;
    }
    .typing span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--purple);
      animation: bounce 1.1s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.18s; background: var(--pink); }
    .typing span:nth-child(3) { animation-delay: 0.36s; background: var(--teal); }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* result banner */
    .result-banner {
      margin-top: 24px;
      border-radius: 14px;
      padding: 22px 20px;
      text-align: center;
      display: none;
    }

    .result-banner.done {
      display: block;
      background: linear-gradient(135deg, rgba(128,255,170,0.05), rgba(110,240,255,0.05));
      border: 1px solid rgba(128,255,170,0.18);
    }

    .result-banner.error-state {
      display: block;
      background: rgba(255,80,80,0.05);
      border: 1px solid rgba(255,80,80,0.18);
    }

    .result-label {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #5a4a7a;
      margin-bottom: 8px;
      font-family: 'Space Mono', monospace;
    }

    .result-value {
      font-family: 'Space Mono', monospace;
      font-size: 5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #80ffaa, #6ef0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      filter: drop-shadow(0 0 20px rgba(110,240,255,0.4));
    }

    .result-quip {
      margin-top: 8px;
      font-size: 0.82rem;
      color: #5a6a8a;
    }

    .error-value {
      font-size: 0.78rem;
      color: #ff7070;
      word-break: break-word;
      font-family: 'Space Mono', monospace;
    }
  </style>
</head>
<body>

  <!-- floating paws -->
  <div class="paws" id="paws"></div>

  <div class="card">

    <!-- cat SVG -->
    <div class="cat-face">
      <svg class="cat-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- ears -->
        <polygon points="18,42 10,18 34,32" fill="#b06eff" opacity="0.9"/>
        <polygon points="82,42 90,18 66,32" fill="#b06eff" opacity="0.9"/>
        <polygon points="20,40 14,22 32,33" fill="#ff6eb4" opacity="0.6"/>
        <polygon points="80,40 86,22 68,33" fill="#ff6eb4" opacity="0.6"/>
        <!-- head -->
        <ellipse cx="50" cy="56" rx="36" ry="32" fill="#1e1630"/>
        <ellipse cx="50" cy="56" rx="35" ry="31" fill="#221840"/>
        <!-- glow ring -->
        <ellipse cx="50" cy="56" rx="35" ry="31" fill="none" stroke="#b06eff" stroke-width="0.8" opacity="0.4"/>
        <!-- eyes -->
        <g class="eye" style="transform-origin:38px 52px">
          <ellipse cx="38" cy="52" rx="8" ry="9" fill="#6ef0ff" opacity="0.95"/>
          <ellipse cx="38" cy="52" rx="4" ry="7" fill="#0d0b14"/>
          <circle  cx="40" cy="49" r="1.5" fill="white" opacity="0.7"/>
        </g>
        <g class="eye-r" style="transform-origin:62px 52px">
          <ellipse cx="62" cy="52" rx="8" ry="9" fill="#6ef0ff" opacity="0.95"/>
          <ellipse cx="62" cy="52" rx="4" ry="7" fill="#0d0b14"/>
          <circle  cx="64" cy="49" r="1.5" fill="white" opacity="0.7"/>
        </g>
        <!-- nose -->
        <polygon points="50,62 47,65 53,65" fill="#ff6eb4" opacity="0.9"/>
        <!-- mouth -->
        <path d="M47 65 Q44 69 41 67" stroke="#ff6eb4" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
        <path d="M53 65 Q56 69 59 67" stroke="#ff6eb4" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
        <!-- whiskers left -->
        <line x1="10" y1="60" x2="40" y2="63" stroke="#4a3a6a" stroke-width="0.9" opacity="0.7"/>
        <line x1="10" y1="65" x2="40" y2="65" stroke="#4a3a6a" stroke-width="0.9" opacity="0.7"/>
        <line x1="12" y1="70" x2="40" y2="67" stroke="#4a3a6a" stroke-width="0.9" opacity="0.7"/>
        <!-- whiskers right -->
        <line x1="90" y1="60" x2="60" y2="63" stroke="#4a3a6a" stroke-width="0.9" opacity="0.7"/>
        <line x1="90" y1="65" x2="60" y2="65" stroke="#4a3a6a" stroke-width="0.9" opacity="0.7"/>
        <line x1="88" y1="70" x2="60" y2="67" stroke="#4a3a6a" stroke-width="0.9" opacity="0.7"/>
      </svg>
    </div>

    <h1>QUANTUM CAT</h1>
    <p class="subtitle">Schrödinger's qubit — real IBM hardware — one shot</p>

    <div class="btn-row">
      <button id="runBtn" onclick="runCircuit()">COLLAPSE THE WAVE</button>
    </div>

    <div class="log-panel" id="logPanel"></div>

    <div class="result-banner" id="resultBanner">
      <div class="result-label" id="resultLabel"></div>
      <div id="resultValue"></div>
      <div class="result-quip" id="resultQuip"></div>
    </div>

  </div>

  <script>
    // floating paws
    const pawSymbols = ['🐾', '🐱', '✦', '⋆'];
    const pawsEl = document.getElementById('paws');
    for (let i = 0; i < 22; i++) {
      const p = document.createElement('div');
      p.className = 'paw';
      p.textContent = pawSymbols[Math.floor(Math.random() * pawSymbols.length)];
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (14 + Math.random() * 22) + 's';
      p.style.animationDelay    = (-Math.random() * 30) + 's';
      p.style.fontSize = (1 + Math.random() * 1.4) + 'rem';
      pawsEl.appendChild(p);
    }

    let pollInterval = null;
    let renderedCount = 0;
    let typingEl = null;

    const logPanel    = document.getElementById('logPanel');
    const resultBanner = document.getElementById('resultBanner');
    const resultLabel  = document.getElementById('resultLabel');
    const resultValue  = document.getElementById('resultValue');
    const resultQuip   = document.getElementById('resultQuip');
    const runBtn       = document.getElementById('runBtn');

    const quips = {
      '0': [
        "the box opens. the cat stares back.",
        "alive. purring in superposition no longer.",
        "the universe chose life. this time.",
      ],
      '1': [
        "dead. and yet — meow.",
        "the box has spoken. the cat disagrees.",
        "collapsed into oblivion. the meow remains.",
      ],
    };

    function reset() {
      renderedCount = 0;
      typingEl = null;
      logPanel.innerHTML = '';
      logPanel.classList.remove('visible');
      resultBanner.className = 'result-banner';
      resultLabel.textContent = '';
      resultValue.className = '';
      resultValue.textContent = '';
      resultQuip.textContent = '';
    }

    function addTyping() {
      const d = document.createElement('div');
      d.className = 'typing';
      d.innerHTML = '<span></span><span></span><span></span>';
      logPanel.appendChild(d);
      logPanel.scrollTop = logPanel.scrollHeight;
      typingEl = d;
    }

    function removeTyping() {
      if (typingEl && typingEl.parentNode) typingEl.parentNode.removeChild(typingEl);
      typingEl = null;
    }

    function appendLog(entry) {
      removeTyping();
      const row = document.createElement('div');
      row.className = 'log-entry' + (entry.kind !== 'info' ? ' ' + entry.kind : '');

      const t = document.createElement('span');
      t.className = 'log-time';
      t.textContent = entry.time;

      const m = document.createElement('span');
      m.className = 'log-msg';
      m.textContent = entry.msg;

      row.appendChild(t);
      row.appendChild(m);
      logPanel.appendChild(row);
      addTyping();
      logPanel.scrollTop = logPanel.scrollHeight;
    }

    function renderLogs(logs) {
      for (let i = renderedCount; i < logs.length; i++) appendLog(logs[i]);
      renderedCount = logs.length;
    }

    async function runCircuit() {
      if (pollInterval) clearInterval(pollInterval);
      reset();
      runBtn.disabled = true;
      logPanel.classList.add('visible');
      addTyping();

      let jobId;
      try {
        const res = await fetch('/run', { method: 'POST' });
        const data = await res.json();
        jobId = data.job_id;
      } catch (e) {
        removeTyping();
        appendLog({ time: now(), msg: 'Failed to reach the server: ' + e.message, kind: 'error' });
        runBtn.disabled = false;
        return;
      }

      pollInterval = setInterval(async () => {
        try {
          const res  = await fetch('/status/' + jobId);
          const data = await res.json();
          renderLogs(data.logs || []);

          if (data.status === 'done') {
            clearInterval(pollInterval);
            removeTyping();
            runBtn.disabled = false;
            resultBanner.classList.add('done');
            resultLabel.textContent = 'The qubit collapsed to';
            resultValue.className = 'result-value';
            resultValue.textContent = data.result;
            const pool = quips[data.result] || ["meow."];
            resultQuip.textContent = pool[Math.floor(Math.random() * pool.length)];
          } else if (data.status === 'error') {
            clearInterval(pollInterval);
            removeTyping();
            runBtn.disabled = false;
            resultBanner.classList.add('error-state');
            resultLabel.textContent = 'something went wrong :(';
            resultValue.className = 'error-value';
            resultValue.textContent = data.result;
          }
        } catch (e) {
          clearInterval(pollInterval);
          removeTyping();
          appendLog({ time: now(), msg: 'Lost connection to server.', kind: 'error' });
          runBtn.disabled = false;
        }
      }, 1500);
    }

    function now() {
      return new Date().toTimeString().slice(0, 8);
    }
  </script>
</body>
</html>
