<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quantum Cat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Space+Mono:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:   #ff2d78;
      --yellow: #ffd600;
      --blue:   #2979ff;
      --green:  #00e676;
      --orange: #ff6d00;
      --purple: #d500f9;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px 60px;
      background: #fffde7;
      background-image:
        radial-gradient(circle at 10% 20%, #ffe0f0 0%, transparent 35%),
        radial-gradient(circle at 90% 10%, #e0f0ff 0%, transparent 35%),
        radial-gradient(circle at 80% 85%, #f3e0ff 0%, transparent 35%),
        radial-gradient(circle at 20% 90%, #e0ffe8 0%, transparent 35%);
      font-family: 'Fredoka One', system-ui, sans-serif;
      color: #1a1a1a;
    }

    /* confetti bits */
    .confetti-wrap {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .dot {
      position: absolute;
      border-radius: 50%;
      animation: fall linear infinite;
      opacity: 0.55;
    }
    @keyframes fall {
      from { transform: translateY(-8vh) rotate(0deg); }
      to   { transform: translateY(110vh) rotate(720deg); }
    }

    .card {
      position: relative;
      z-index: 1;
      background: #ffffff;
      border-radius: 32px;
      padding: 40px 48px 44px;
      width: 560px;
      border: 3px solid #1a1a1a;
      box-shadow:
        6px 6px 0 #1a1a1a,
        12px 12px 0 var(--pink),
        18px 18px 0 var(--yellow);
    }

    /* cat */
    .cat-face {
      text-align: center;
      margin-bottom: 16px;
    }
    .cat-svg {
      width: 96px;
      height: 96px;
      filter: drop-shadow(3px 3px 0px #1a1a1a);
    }
    .eye  { animation: blink 3.5s ease-in-out infinite; transform-origin: center; }
    .eye-r{ animation: blink 3.5s ease-in-out infinite 0.1s; transform-origin: center; }
    @keyframes blink {
      0%,90%,100% { transform: scaleY(1); }
      95% { transform: scaleY(0.08); }
    }

    h1 {
      font-family: 'Fredoka One', sans-serif;
      font-size: 2.4rem;
      text-align: center;
      margin-bottom: 4px;
      letter-spacing: 0.03em;
      background: linear-gradient(90deg, var(--pink), var(--purple), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      -webkit-text-stroke: 0px transparent;
      paint-order: stroke fill;
    }

    .subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: #888;
      text-align: center;
      margin-bottom: 32px;
      letter-spacing: 0.05em;
    }

    .btn-row { display: flex; justify-content: center; }

    button {
      font-family: 'Fredoka One', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.05em;
      color: #1a1a1a;
      background: var(--yellow);
      border: 3px solid #1a1a1a;
      border-radius: 50px;
      padding: 14px 44px;
      cursor: pointer;
      position: relative;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 4px 4px 0 #1a1a1a;
    }
    button::before { content: '🐾 '; }
    button:hover:not(:disabled) {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 #1a1a1a;
    }
    button:active:not(:disabled) {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #1a1a1a;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: 4px 4px 0 #ccc; }

    /* log panel */
    .log-panel {
      margin-top: 28px;
      background: #fafafa;
      border: 2px solid #1a1a1a;
      border-radius: 16px;
      padding: 14px 16px;
      max-height: 180px;
      overflow-y: auto;
      display: none;
      scroll-behavior: smooth;
      font-family: 'Space Mono', monospace;
    }
    .log-panel::-webkit-scrollbar { width: 5px; }
    .log-panel::-webkit-scrollbar-track { background: #f0f0f0; border-radius: 4px; }
    .log-panel::-webkit-scrollbar-thumb { background: var(--pink); border-radius: 4px; }
    .log-panel.visible { display: block; }

    .log-entry {
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px dashed #e0e0e0;
      font-size: 0.75rem;
      line-height: 1.5;
      animation: popIn 0.2s cubic-bezier(.34,1.56,.64,1);
    }
    .log-entry:last-child { border-bottom: none; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.95) translateY(4px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .log-time { color: #bbb; padding-top: 1px; user-select: none; }
    .log-msg  { color: #555; }
    .log-entry.success .log-msg { color: #00b248; font-weight: 700; }
    .log-entry.error   .log-msg { color: var(--pink); font-weight: 700; }

    /* typing dots */
    .typing { display: flex; gap: 5px; padding: 8px 0 2px; align-items: center; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      animation: tdot 0.9s ease-in-out infinite;
    }
    .typing span:nth-child(1) { background: var(--pink);   animation-delay: 0s; }
    .typing span:nth-child(2) { background: var(--yellow); animation-delay: 0.15s; }
    .typing span:nth-child(3) { background: var(--blue);   animation-delay: 0.3s; }
    @keyframes tdot {
      0%,80%,100% { transform: translateY(0); }
      40% { transform: translateY(-7px); }
    }

    /* result banner */
    .result-banner {
      margin-top: 24px;
      border-radius: 20px;
      padding: 24px 20px 20px;
      text-align: center;
      display: none;
      border: 3px solid #1a1a1a;
      position: relative;
      overflow: hidden;
    }
    .result-banner.done {
      display: block;
      background: linear-gradient(135deg, #fffde7, #e8f5e9);
      box-shadow: 5px 5px 0 #1a1a1a;
    }
    .result-banner.error-state {
      display: block;
      background: #fff0f3;
      box-shadow: 5px 5px 0 var(--pink);
    }

    .result-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 6px;
    }

    .result-value {
      font-family: 'Fredoka One', sans-serif;
      font-size: 6rem;
      line-height: 1;
      background: linear-gradient(135deg, var(--pink), var(--orange), var(--yellow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(3px 3px 0px rgba(0,0,0,0.12));
    }

    .result-quip {
      margin-top: 8px;
      font-size: 1.05rem;
      color: #444;
      letter-spacing: 0.02em;
    }

    .error-value {
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      color: var(--pink);
      word-break: break-word;
    }

    /* badge stickers on card */
    .sticker {
      position: absolute;
      font-size: 1.8rem;
      animation: wiggle 3s ease-in-out infinite;
      user-select: none;
    }
    .sticker-1 { top: -18px; right: 24px; animation-delay: 0s; }
    .sticker-2 { top: -14px; left: 32px; animation-delay: 0.6s; }
    .sticker-3 { bottom: -16px; right: 40px; animation-delay: 1.2s; }

    @keyframes wiggle {
      0%,100% { transform: rotate(-8deg) scale(1); }
      50%      { transform: rotate(8deg) scale(1.12); }
    }
  </style>
</head>
<body>

  <div class="confetti-wrap" id="confetti"></div>

  <div class="card">
    <span class="sticker sticker-1">⚛️</span>
    <span class="sticker sticker-2">✨</span>
    <span class="sticker sticker-3">🌟</span>

    <!-- cat SVG -->
    <div class="cat-face">
      <svg class="cat-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- ears -->
        <polygon points="18,44 8,16 36,32" fill="#ff2d78"/>
        <polygon points="82,44 92,16 64,32" fill="#ff2d78"/>
        <polygon points="20,42 12,22 34,33" fill="#ffb3cc"/>
        <polygon points="80,42 88,22 66,33" fill="#ffb3cc"/>
        <!-- head -->
        <ellipse cx="50" cy="57" rx="37" ry="33" fill="#fff0f5"/>
        <ellipse cx="50" cy="57" rx="37" ry="33" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
        <!-- eyes -->
        <g class="eye" style="transform-origin:37px 52px">
          <ellipse cx="37" cy="52" rx="9" ry="10" fill="#2979ff"/>
          <ellipse cx="37" cy="52" rx="5" ry="8"  fill="#1a1a1a"/>
          <circle  cx="39" cy="48" r="2"           fill="white"/>
        </g>
        <g class="eye-r" style="transform-origin:63px 52px">
          <ellipse cx="63" cy="52" rx="9" ry="10" fill="#2979ff"/>
          <ellipse cx="63" cy="52" rx="5" ry="8"  fill="#1a1a1a"/>
          <circle  cx="65" cy="48" r="2"           fill="white"/>
        </g>
        <!-- nose -->
        <polygon points="50,63 47,67 53,67" fill="#ff2d78"/>
        <!-- mouth -->
        <path d="M47 67 Q44 71 41 69" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path d="M53 67 Q56 71 59 69" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- blush -->
        <ellipse cx="28" cy="66" rx="7" ry="4" fill="#ffb3cc" opacity="0.7"/>
        <ellipse cx="72" cy="66" rx="7" ry="4" fill="#ffb3cc" opacity="0.7"/>
        <!-- whiskers -->
        <line x1="8"  y1="60" x2="40" y2="63" stroke="#1a1a1a" stroke-width="1" opacity="0.4"/>
        <line x1="8"  y1="66" x2="40" y2="65" stroke="#1a1a1a" stroke-width="1" opacity="0.4"/>
        <line x1="92" y1="60" x2="60" y2="63" stroke="#1a1a1a" stroke-width="1" opacity="0.4"/>
        <line x1="92" y1="66" x2="60" y2="65" stroke="#1a1a1a" stroke-width="1" opacity="0.4"/>
      </svg>
    </div>

    <h1>QUANTUM CAT</h1>
    <p class="subtitle">Schrödinger's qubit — real IBM hardware — one shot</p>

    <div class="btn-row">
      <button id="runBtn" onclick="runCircuit()">COLLAPSE THE WAVE</button>
    </div>

    <div class="log-panel" id="logPanel"></div>

    <div class="result-banner" id="resultBanner">
      <div class="result-label" id="resultLabel"></div>
      <div id="resultValue"></div>
      <div class="result-quip" id="resultQuip"></div>
    </div>
  </div>

  <script>
    // confetti dots
    const colors = ['#ff2d78','#ffd600','#2979ff','#00e676','#d500f9','#ff6d00'];
    const wrap = document.getElementById('confetti');
    for (let i = 0; i < 30; i++) {
      const d = document.createElement('div');
      d.className = 'dot';
      const size = 6 + Math.random() * 10;
      d.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}vw;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${8 + Math.random()*16}s;
        animation-delay:${-Math.random()*20}s;
        border-radius:${Math.random()>0.4?'50%':'4px'};
      `;
      wrap.appendChild(d);
    }

    let pollInterval = null;
    let renderedCount = 0;
    let typingEl = null;

    const logPanel    = document.getElementById('logPanel');
    const resultBanner = document.getElementById('resultBanner');
    const resultLabel  = document.getElementById('resultLabel');
    const resultValue  = document.getElementById('resultValue');
    const resultQuip   = document.getElementById('resultQuip');
    const runBtn       = document.getElementById('runBtn');

    const quips = {
      '0': [
        "the box opens. the cat stares back.",
        "alive. purring in superposition no longer.",
        "the universe chose life. this time.",
      ],
      '1': [
        "dead. and yet — meow.",
        "the box has spoken. the cat disagrees.",
        "collapsed into oblivion. the meow remains.",
      ],
    };

    function reset() {
      renderedCount = 0;
      typingEl = null;
      logPanel.innerHTML = '';
      logPanel.classList.remove('visible');
      resultBanner.className = 'result-banner';
      resultLabel.textContent = '';
      resultValue.className = '';
      resultValue.textContent = '';
      resultQuip.textContent = '';
    }

    function addTyping() {
      const d = document.createElement('div');
      d.className = 'typing';
      d.innerHTML = '<span></span><span></span><span></span>';
      logPanel.appendChild(d);
      logPanel.scrollTop = logPanel.scrollHeight;
      typingEl = d;
    }

    function removeTyping() {
      if (typingEl && typingEl.parentNode) typingEl.parentNode.removeChild(typingEl);
      typingEl = null;
    }

    function appendLog(entry) {
      removeTyping();
      const row = document.createElement('div');
      row.className = 'log-entry' + (entry.kind !== 'info' ? ' ' + entry.kind : '');
      const t = document.createElement('span');
      t.className = 'log-time';
      t.textContent = entry.time;
      const m = document.createElement('span');
      m.className = 'log-msg';
      m.textContent = entry.msg;
      row.appendChild(t);
      row.appendChild(m);
      logPanel.appendChild(row);
      addTyping();
      logPanel.scrollTop = logPanel.scrollHeight;
    }

    function renderLogs(logs) {
      for (let i = renderedCount; i < logs.length; i++) appendLog(logs[i]);
      renderedCount = logs.length;
    }

    async function runCircuit() {
      if (pollInterval) clearInterval(pollInterval);
      reset();
      runBtn.disabled = true;
      logPanel.classList.add('visible');
      addTyping();

      let jobId;
      try {
        const res  = await fetch('/run', { method: 'POST' });
        const data = await res.json();
        jobId = data.job_id;
      } catch (e) {
        removeTyping();
        appendLog({ time: now(), msg: 'Failed to reach the server: ' + e.message, kind: 'error' });
        runBtn.disabled = false;
        return;
      }

      pollInterval = setInterval(async () => {
        try {
          const res  = await fetch('/status/' + jobId);
          const data = await res.json();
          renderLogs(data.logs || []);

          if (data.status === 'done') {
            clearInterval(pollInterval);
            removeTyping();
            runBtn.disabled = false;
            resultBanner.classList.add('done');
            resultLabel.textContent = 'the qubit collapsed to';
            resultValue.className = 'result-value';
            resultValue.textContent = data.result;
            const pool = quips[data.result] || ['meow.'];
            resultQuip.textContent = pool[Math.floor(Math.random() * pool.length)];
          } else if (data.status === 'error') {
            clearInterval(pollInterval);
            removeTyping();
            runBtn.disabled = false;
            resultBanner.classList.add('error-state');
            resultLabel.textContent = 'something went wrong :(';
            resultValue.className = 'error-value';
            resultValue.textContent = data.result;
          }
        } catch (e) {
          clearInterval(pollInterval);
          removeTyping();
          appendLog({ time: now(), msg: 'Lost connection to server.', kind: 'error' });
          runBtn.disabled = false;
        }
      }, 1500);
    }

    function now() {
      return new Date().toTimeString().slice(0, 8);
    }
  </script>
</body>
</html>
